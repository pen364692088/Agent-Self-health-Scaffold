# 每日 06:00 CDT 运行观察窗口检查
0 6 * * * cd /home/moonlight/Project/Github/MyProject/Agent-Self-health-Scaffold && /usr/bin/python3 scripts/observation_daily_check.py >> artifacts/observation_window/daily_logs/cron.log 2>&1

