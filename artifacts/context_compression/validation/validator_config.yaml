# Context Compression S1 Validator Configuration
# 验证 agent 独立运行，不接入主链路

validator:
  id: "s1-validator"
  name: "S1 Shadow Validator"
  type: "testbot"
  
constraints:
  # 验证 agent 权限限制
  can_modify_compression_strategy: false
  can_modify_prompt_template: false
  can_modify_schema: false
  can_modify_metrics_formula: false
  can_self_certify_gate1: false  # Gate 1 必须由独立脚本判定
  
  # 只读访问
  read_only:
    - artifacts/context_compression/
    - schemas/
    - POLICIES/
    - tools/context-*
  
  # 可写入
  write_allowed:
    - artifacts/context_compression/validation/samples/
    - artifacts/context_compression/validation/reports/
    - artifacts/context_compression/KNOWN_ISSUES.md
    - artifacts/context_compression/failures.jsonl

sampling:
  # 样本收集配置
  real_samples:
    enabled: true
    source: ".session-index/sessions/"
    read_only: true  # 只读复制，不修改原文件
    
  synthetic_samples:
    enabled: true
    priority: "weakest_bucket_first"
    templates_dir: "validation/templates/"
    
  metadata_required:
    - sample_id
    - session_id
    - source_type  # real/synthetic
    - bucket_tags  # 多标签
    - baseline_commit
    - retrieve_mode  # 固定为 capsule_only

execution:
  # 固定执行流程
  steps:
    - name: budget_check
      tool: context-budget-check
      args: ["--state", "{state_file}", "--history", "{history_file}", "--json"]
      
    - name: shadow_compress
      tool: context-compress
      args: ["--session-id", "{session_id}", "--state", "{state_file}", 
             "--history", "{history_file}", "--mode", "shadow", "--json"]
      
    - name: capsule_retrieve
      tool: context-retrieve
      args: ["--query", "{query}", "--session-id", "{session_id}", 
             "--capsule-only", "--json"]
      
    - name: retrieve_followup
      repeat: 2  # 继续执行 1-3 轮
      tool: context-retrieve
      args: ["--query", "{query}", "--session-id", "{session_id}",
             "--capsule-only", "--json"]
      
    - name: score_output
      output_fields:
        - old_topic_recovery
        - commitment_preservation
        - commitment_drift
        - priority_preservation
        - compression_gain_ratio
        - source_mix_distribution

scoring:
  # 评分指标
  metrics:
    old_topic_recovery:
      description: "旧话题恢复成功率"
      formula: "successful_recoveries / total_old_topic_returns"
      
    commitment_preservation:
      description: "承诺保留率"
      formula: "preserved_commitments / total_commitments"
      
    commitment_drift:
      description: "承诺漂移率"
      formula: "drifted_commitments / total_commitments"
      
    priority_preservation:
      description: "优先级保留率"
      formula: "preserved_priorities / total_priorities"
      
    compression_gain_ratio:
      description: "压缩收益比"
      formula: "(before_tokens - after_tokens) / before_tokens"
      
    source_mix_distribution:
      description: "检索来源分布"
      formula: "capsule_sources / total_sources"

failure_handling:
  # Hard fail 处理
  auto_record: true
  files:
    - artifacts/context_compression/KNOWN_ISSUES.md
    - artifacts/context_compression/failures.jsonl
  
  severity_levels:
    - blocker: "影响 S1 继续"
    - critical: "指标严重偏差"
    - warning: "需要观察"

reporting:
  # 自动日报
  daily_report:
    enabled: true
    output: "artifacts/context_compression/validation/reports/daily/"
    format: markdown
    
  gate_eval:
    independent_script: "tools/gate-eval"
    frequency: "per_sample"
    output: "artifacts/context_compression/validation/reports/gate_eval/"

baseline:
  commit: "31a604a"
  frozen_at: "2026-03-06T12:00:00CST"
