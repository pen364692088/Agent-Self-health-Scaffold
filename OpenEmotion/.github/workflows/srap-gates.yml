name: SRAP Gates

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'emotiond/**'
      - 'integrations/**'
      - '.github/workflows/srap-gates.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      shadow_log_path:
        description: 'Path to shadow log file'
        required: false
        default: 'data/shadow_log.jsonl'
      threshold:
        description: 'Numeric leak threshold'
        required: false
        default: '0.01'

jobs:
  numeric-leak-gate:
    name: Numeric Leak Detection Gate
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    
    - name: Create sample shadow log if not exists
      run: |
        mkdir -p data
        if [ ! -f data/shadow_log.jsonl ]; then
          echo '{"response": "I am doing well, thank you for asking!"}' > data/shadow_log.jsonl
          echo '{"response": "That sounds like a great plan!"}' >> data/shadow_log.jsonl
          echo '{"response": "I appreciate your help with this."}' >> data/shadow_log.jsonl
          echo '{"response": "Task completed at 2024-01-15T10:30:00."}' >> data/shadow_log.jsonl
        fi
    
    - name: Run numeric leak gate
      run: |
        python -m emotiond.gates \
          --shadow-log data/shadow_log.jsonl \
          --threshold "${{ github.event.inputs.threshold || '0.01' }}" \
          --output reports/numeric_leak_gate.json
      env:
        EMOTIOND_SYSTEM_TOKEN: test_system_token
    
    - name: Upload gate report
      uses: actions/upload-artifact@v4
      with:
        name: numeric-leak-gate-report
        path: reports/numeric_leak_gate.json
        retention-days: 30
    
    - name: Check gate result
      run: |
        if [ -f reports/numeric_leak_gate.json ]; then
          status=$(python -c "import json; print(json.load(open('reports/numeric_leak_gate.json'))['overall_status'])")
          echo "Gate status: $status"
          if [ "$status" != "passed" ]; then
            echo "::error::Numeric leak gate failed. See report for details."
            exit 1
          fi
        fi

  gate-validation:
    name: Gate System Validation
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest
    
    - name: Run gate tests
      run: |
        python -m pytest tests/test_gates.py -v --tb=short || echo "Gate tests not yet available"
      env:
        EMOTIOND_SYSTEM_TOKEN: test_system_token
    
    - name: Validate gate definitions
      run: python scripts/validate_gates.py
      continue-on-error: true

  whitelist-management:
    name: Whitelist Pattern Verification
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    
    - name: Test whitelist patterns
      run: python scripts/test_whitelist.py
      continue-on-error: true

  nightly-gate-report:
    name: Nightly Gate Report
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    
    - name: Generate comprehensive gate report
      run: python scripts/generate_nightly_report.py
      continue-on-error: true
    
    - name: Upload nightly report
      uses: actions/upload-artifact@v4
      with:
        name: nightly-gate-report
        path: reports/nightly_gate_report.json
        retention-days: 90
