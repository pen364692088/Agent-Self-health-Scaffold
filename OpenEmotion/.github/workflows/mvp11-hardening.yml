name: MVP11 E2E + CI Hardening

on:
  pull_request:
    branches: [main, master, feature-emotiond-mvp]
  push:
    branches: [main, master, feature-emotiond-mvp]
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  pr-quick-gate:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e .
          pip install pytest jq

      - name: Start emotiond daemon
        run: |
          . .venv/bin/activate
          python -m emotiond.main > /tmp/emotiond.log 2>&1 &
          sleep 6
          curl -fsS http://127.0.0.1:18080/health | jq .

      - name: D1 - MVP11 API smoke
        run: |
          chmod +x tools/e2e_api_smoke_mvp11.sh
          bash tools/e2e_api_smoke_mvp11.sh

      - name: D2/D3/D5 - MVP11 unified CI profile
        run: |
          . .venv/bin/activate
          python scripts/mvp11_e2e.py --profile ci --eval-mode quick

      - name: Print run pointers (debug)
        if: always()
        run: |
          echo "artifacts_dir=artifacts/mvp11"
          ls -lt artifacts/mvp11 | head -n 50 || true
          python - << 'PY'
import glob, json
files = sorted(glob.glob('artifacts/mvp11/mvp11_final_summary_*.json'))
if not files:
    print('final_summary=NOT_FOUND')
else:
    p = files[-1]
    print(f'final_summary={p}')
    d = json.load(open(p))
    print(f'pass={d.get("pass")}')
    print(f'science_eval={d.get("paths", {}).get("science_eval")}')
    print(f'replay_eval={d.get("paths", {}).get("replay_eval")}')
    print(f'full_soak_report={d.get("paths", {}).get("full_soak_report")}')
PY

      - name: Upload MVP11 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mvp11-pr-${{ github.run_id }}
          path: artifacts/mvp11/**

  nightly-full-gate:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e .
          pip install pytest jq

      - name: Start emotiond daemon
        run: |
          . .venv/bin/activate
          python -m emotiond.main > /tmp/emotiond.log 2>&1 &
          sleep 6
          curl -fsS http://127.0.0.1:18080/health | jq .

      - name: D1 - MVP11 API smoke
        run: |
          chmod +x tools/e2e_api_smoke_mvp11.sh
          bash tools/e2e_api_smoke_mvp11.sh

      - name: D2/D3/D5 - MVP11 unified full profile
        run: |
          . .venv/bin/activate
          python scripts/mvp11_e2e.py --profile full --eval-mode science

      - name: Print run pointers (debug)
        if: always()
        run: |
          echo "artifacts_dir=artifacts/mvp11"
          ls -lt artifacts/mvp11 | head -n 80 || true
          python - << 'PY'
import glob, json
files = sorted(glob.glob('artifacts/mvp11/mvp11_final_summary_*.json'))
if not files:
    print('final_summary=NOT_FOUND')
else:
    p = files[-1]
    print(f'final_summary={p}')
    d = json.load(open(p))
    print(f'pass={d.get("pass")}')
    print(f'science_eval={d.get("paths", {}).get("science_eval")}')
    print(f'replay_eval={d.get("paths", {}).get("replay_eval")}')
    print(f'full_soak_report={d.get("paths", {}).get("full_soak_report")}')
PY

      - name: Upload MVP11 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mvp11-nightly-${{ github.run_id }}
          path: artifacts/mvp11/**
