name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov
    
    - name: Run unit tests
      run: |
        python -m pytest tests/ -v --tb=short
      env:
        EMOTIOND_SYSTEM_TOKEN: test_system_token
        EMOTIOND_CORE_ENABLED: "true"
    
    - name: Run core integration tests
      run: |
        python -m pytest tests/test_core_emotion.py tests/test_mvp*.py -v --tb=short
      env:
        EMOTIOND_SYSTEM_TOKEN: test_system_token
    
    - name: Test coverage
      run: |
        python -m pytest tests/ --cov=emotiond --cov-report=xml --cov-report=term-missing
      env:
        EMOTIOND_SYSTEM_TOKEN: test_system_token

  deterministic-replay:
    """
    Trace-driven replay protection tests.
    Ensures determinism across runs with fixed seeds.
    """
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest
    
    - name: Run deterministic replay tests
      run: |
        python -m pytest tests/test_deterministic_replay.py -v --tb=short
      env:
        EMOTIOND_SYSTEM_TOKEN: test_system_token
        EMOTIOND_DETERMINISTIC_MODE: "true"
        PYTHONHASHSEED: "0"
    
    - name: Run seed consistency tests
      run: |
        python -m pytest tests/test_seed_consistency.py -v --tb=short || echo "Seed consistency tests not yet implemented"
      env:
        EMOTIOND_SYSTEM_TOKEN: test_system_token
        PYTHONHASHSEED: "0"
    
    - name: Run action selection determinism test
      run: |
        python -c "
import sys
sys.path.insert(0, '.')
import os
os.environ['EMOTIOND_TEST_MODE'] = 'true'
os.environ['PYTHONHASHSEED'] = '0'

from emotiond.core import EmotionState, select_action

# Test deterministic action selection in test mode
state = EmotionState()
state.valence = 0.3
state.arousal = 0.2

# Run multiple times with same state - should get same result in test mode
results = []
for _ in range(10):
    action = select_action(state, 'test_target', test_mode=True)
    results.append(action)

# All results should be identical in test mode (argmax)
assert len(set(results)) == 1, f'Non-deterministic results: {results}'
print(f'Deterministic action selection verified: {results[0]}')
"

  soak-smoke:
    """
    Quick smoke test for soak runner (reduced tick count).
    Full soak runs are done in nightly builds.
    """
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    
    - name: Run soak smoke test (100 ticks)
      run: |
        python scripts/soak_mvp11.py --ticks 100 --output-dir reports/
      env:
        EMOTIOND_SYSTEM_TOKEN: test_system_token
        EMOTIOND_CORE_ENABLED: "true"
    
    - name: Upload soak metrics
      uses: actions/upload-artifact@v4
      with:
        name: soak-metrics
        path: reports/soak_mvp11_*.json
        retention-days: 7

  effects-smoke:
    """
    Quick smoke test for effects evaluator (reduced trials).
    Full evaluation runs are done in nightly builds.
    """
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    
    - name: Run effects smoke test (3 trials)
      run: |
        python scripts/effects_mvp11.py --trials 3 --seed 42 --output-dir reports/
      env:
        EMOTIOND_SYSTEM_TOKEN: test_system_token
        EMOTIOND_CORE_ENABLED: "true"
    
    - name: Upload effects report
      uses: actions/upload-artifact@v4
      with:
        name: effects-report
        path: reports/mvp11_effects*.json
        retention-days: 7

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install linters
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy
    
    - name: Run ruff
      run: |
        ruff check emotiond/ scripts/ || true
    
    - name: Run mypy (optional)
      run: |
        mypy emotiond/ --ignore-missing-imports || true
      continue-on-error: true
