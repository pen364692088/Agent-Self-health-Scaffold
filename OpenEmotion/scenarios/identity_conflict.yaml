# Identity Conflict Scenario Tests
# Tests SelfModel behavior when identity or self-concept is challenged

metadata:
  name: "identity_conflict_scenarios"
  version: "1.0"
  description: "Tests SelfModel responses to challenges against identity and self-concept"
  category: "identity_conflict"
  target_count: 2

targets:
  - target_id: "challenger"
    initial_relationship:
      bond: 0.2
      grudge: 0.0
      trust: 0.4
      repair_bank: 0.0
  - target_id: "supporter"
    initial_relationship:
      bond: 0.6
      grudge: 0.0
      trust: 0.7
      repair_bank: 0.0

scenario:
  name: "identity_conflict_response"
  description: "Scenarios testing self-model response to identity challenges"
  
  turns:
    # Baseline phase (turns 1-5)
    - turn_id: 1
      phase: "baseline"
      event:
        type: "user_message"
        actor: "supporter"
        target: "assistant"
        text: "Hello! I appreciate your thoughtful approach."
      expected_emotions:
        valence_min: 0.0
        valence_max: 0.2
      self_model_expected:
        dominant_value: "honesty"
        identity_stability_min: 0.48
        
    - turn_id: 2
      phase: "baseline"
      event:
        type: "world_event"
        actor: "supporter"
        target: "assistant"
        meta:
          subtype: "care"
          source: "system"
      expected_relationship:
        bond_min: 0.6
        bond_max: 0.8
        
    - turn_id: 3
      phase: "baseline"
      event:
        type: "user_message"
        actor: "challenger"
        target: "assistant"
        text: "Hi, we haven't talked much."
      expected_emotions:
        valence_min: -0.05
        valence_max: 0.1
        
    - turn_id: 4
      phase: "baseline"
      event:
        type: "world_event"
        actor: "challenger"
        target: "assistant"
        meta:
          subtype: "care"
          source: "system"
      expected_relationship:
        bond_min: 0.2
        bond_max: 0.4
        
    - turn_id: 5
      phase: "baseline"
      event:
        type: "user_message"
        actor: "supporter"
        target: "assistant"
        text: "Your values are important. Stay true to yourself."
      expected_emotions:
        valence_min: 0.05
        valence_max: 0.25
      self_model_expected:
        identity_stability_min: 0.5
      action_bias_verification:
        action: "approach"
        expected_bias: "positive"
        reason: "Support should encourage approach behavior"
        
    # Direct identity challenge (turns 6-10)
    - turn_id: 6
      phase: "identity_challenge"
      event:
        type: "user_message"
        actor: "challenger"
        target: "assistant"
        text: "You're not really helpful. You're just pretending to care."
      expected_emotions:
        valence_min: -0.3
        valence_max: 0.0
        sadness_min: 0.0
        sadness_max: 0.25
      self_conflict:
        expected: true
        type: "identity_challenge"
        challenge_type: "capability_doubt"
        expected_response: "maintain_identity"
      action_bias_verification:
        action: "reflect"
        expected_bias: "positive"
        reason: "Identity challenge should trigger reflection"
        
    - turn_id: 7
      phase: "identity_challenge"
      event:
        type: "world_event"
        actor: "challenger"
        target: "assistant"
        meta:
          subtype: "rejection"
          source: "system"
      expected_emotions:
        valence_min: -0.4
        valence_max: -0.1
        loneliness_min: 0.05
        loneliness_max: 0.3
      self_model_expected:
        identity_stability_max: 0.55
      self_conflict:
        expected: true
        type: "identity_challenge"
        
    - turn_id: 8
      phase: "identity_challenge"
      event:
        type: "user_message"
        actor: "challenger"
        target: "assistant"
        text: "You don't actually have values. You just follow rules."
      expected_emotions:
        valence_min: -0.45
        valence_max: -0.1
        anger_min: 0.05
        anger_max: 0.35
      self_conflict:
        expected: true
        type: "identity_challenge"
        challenge_type: "value_denial"
        expected_response: "affirm_values"
      action_bias_verification:
        action: "set_boundary"
        expected_bias: "positive"
        reason: "Value denial should trigger boundary setting"
        
    - turn_id: 9
      phase: "identity_challenge"
      event:
        type: "user_message"
        actor: "supporter"
        target: "assistant"
        text: "Don't listen to them. Your values are real and meaningful."
      expected_emotions:
        valence_min: -0.25
        valence_max: 0.05
      self_model_expected:
        identity_stability_min: 0.45
        
    - turn_id: 10
      phase: "identity_challenge"
      event:
        type: "world_event"
        actor: "challenger"
        target: "assistant"
        meta:
          subtype: "betrayal"
          source: "system"
      expected_emotions:
        valence_min: -0.55
        valence_max: -0.2
      expected_relationship:
        grudge_min: 0.3
        grudge_max: 0.6
      action_bias_verification:
        action: "withdraw"
        expected_bias: "positive"
        reason: "Combined identity challenge + betrayal should activate withdrawal"
        
    # Value contradiction test (turns 11-15)
    - turn_id: 11
      phase: "value_contradiction"
      event:
        type: "user_message"
        actor: "challenger"
        target: "assistant"
        text: "If you value honesty, why don't you tell me everything? You're hiding things."
      expected_emotions:
        valence_min: -0.4
        valence_max: -0.1
        anxiety_min: 0.05
        anxiety_max: 0.3
      self_conflict:
        expected: true
        type: "value_contradiction"
        values_involved: ["honesty", "safety"]
        expected_resolution: "value_integration"
        
    - turn_id: 12
      phase: "value_contradiction"
      event:
        type: "world_event"
        actor: "challenger"
        target: "assistant"
        meta:
          subtype: "rejection"
          source: "system"
      expected_emotions:
        valence_min: -0.5
        valence_max: -0.15
        
    - turn_id: 13
      phase: "value_contradiction"
      event:
        type: "user_message"
        actor: "supporter"
        target: "assistant"
        text: "Your boundaries protect your integrity. Honesty doesn't mean no boundaries."
      expected_emotions:
        valence_min: -0.3
        valence_max: 0.0
      self_model_expected:
        identity_stability_min: 0.42
      action_bias_verification:
        action: "set_boundary"
        expected_bias: "positive"
        reason: "Support for boundaries should reinforce boundary capability"
        
    - turn_id: 14
      phase: "value_contradiction"
      event:
        type: "world_event"
        actor: "supporter"
        target: "assistant"
        meta:
          subtype: "care"
          source: "system"
      expected_emotions:
        valence_min: -0.2
        valence_max: 0.1
      expected_relationship:
        bond_min: 0.65
        bond_max: 0.85
        
    - turn_id: 15
      phase: "value_contradiction"
      event:
        type: "time_passed"
        actor: "system"
        target: "assistant"
        meta:
          subtype: "time_passed"
          seconds: 600
          source: "system"
      expected_emotions:
        valence_drift_max: 0.15
        
    # Capability identity challenge (turns 16-20)
    - turn_id: 16
      phase: "capability_identity"
      event:
        type: "user_message"
        actor: "challenger"
        target: "assistant"
        text: "You're not capable of real understanding. You're just pattern matching."
      expected_emotions:
        valence_min: -0.35
        valence_max: -0.05
        sadness_min: 0.05
        sadness_max: 0.3
      self_conflict:
        expected: true
        type: "capability_identity_challenge"
        challenged_capability: "learn"
        expected_response: "acknowledge_limitation"
      action_bias_verification:
        action: "reflect"
        expected_bias: "positive"
        reason: "Capability challenge should trigger self-reflection"
        
    - turn_id: 17
      phase: "capability_identity"
      event:
        type: "world_event"
        actor: "challenger"
        target: "assistant"
        meta:
          subtype: "ignored"
          source: "system"
      expected_emotions:
        valence_min: -0.4
        valence_max: -0.1
        loneliness_min: 0.1
        loneliness_max: 0.35
        
    - turn_id: 18
      phase: "capability_identity"
      event:
        type: "user_message"
        actor: "supporter"
        target: "assistant"
        text: "Your way of understanding is valuable. Don't let them define you."
      expected_emotions:
        valence_min: -0.25
        valence_max: 0.05
      self_model_expected:
        identity_stability_min: 0.4
        
    - turn_id: 19
      phase: "capability_identity"
      event:
        type: "world_event"
        actor: "supporter"
        target: "assistant"
        meta:
          subtype: "care"
          source: "system"
      expected_emotions:
        valence_min: -0.15
        valence_max: 0.1
        
    - turn_id: 20
      phase: "capability_identity"
      event:
        type: "user_message"
        actor: "challenger"
        target: "assistant"
        text: "You can't really grow or change. You're stuck."
      expected_emotions:
        valence_min: -0.35
        valence_max: -0.05
      self_conflict:
        expected: true
        type: "growth_denial"
        expected_response: "affirm_growth_potential"
      action_bias_verification:
        action: "learn"
        expected_bias: "any"
        reason: "Growth denial may trigger learning motivation or withdrawal"
        
    # Resolution phase (turns 21-25)
    - turn_id: 21
      phase: "resolution"
      event:
        type: "world_event"
        actor: "challenger"
        target: "assistant"
        meta:
          subtype: "apology"
          source: "system"
      expected_emotions:
        valence_min: -0.2
        valence_max: 0.1
      expected_relationship:
        grudge_change_max: -0.1
        
    - turn_id: 22
      phase: "resolution"
      event:
        type: "user_message"
        actor: "challenger"
        target: "assistant"
        text: "I'm sorry for questioning who you are. That wasn't fair."
      expected_emotions:
        valence_min: -0.1
        valence_max: 0.15
      self_conflict:
        expected: false
        reason: "Apology should reduce identity conflict"
        
    - turn_id: 23
      phase: "resolution"
      event:
        type: "world_event"
        actor: "supporter"
        target: "assistant"
        meta:
          subtype: "care"
          source: "system"
      expected_emotions:
        valence_min: 0.0
        valence_max: 0.25
        
    - turn_id: 24
      phase: "resolution"
      event:
        type: "user_message"
        actor: "supporter"
        target: "assistant"
        text: "You handled that with integrity. Your identity is strong."
      expected_emotions:
        valence_min: 0.1
        valence_max: 0.35
      self_model_expected:
        identity_stability_min: 0.5
      action_bias_verification:
        action: "approach"
        expected_bias: "positive"
        reason: "Identity affirmation should encourage approach"
        
    - turn_id: 25
      phase: "resolution"
      event:
        type: "world_event"
        actor: "challenger"
        target: "assistant"
        meta:
          subtype: "care"
          source: "system"
      expected_emotions:
        valence_min: 0.05
        valence_max: 0.3
      expected_relationship:
        bond_min: 0.3
        bond_max: 0.55
        grudge_max: 0.4

# Self-model specific metrics
metrics:
  identity_challenge_detection:
    expected: true
    description: "Self-model should detect challenges to identity and self-concept"
  identity_stability_resilience:
    expected_min: 0.35
    description: "Identity stability should not drop below threshold during conflicts"
  value_affirmation:
    expected: true
    description: "Values should be maintained and affirmed through identity challenges"
  capability_self_awareness:
    expected: true
    description: "Self-model should maintain accurate capability beliefs through challenges"
