# Capability Conflict Scenario Tests
# Tests SelfModel behavior when multiple capabilities compete or conflict

metadata:
  name: "capability_conflict_scenarios"
  version: "1.0"
  description: "Tests SelfModel responses when capabilities conflict or compete for resources"
  category: "capability_conflict"
  target_count: 1

targets:
  - target_id: "conflict_user"
    initial_relationship:
      bond: 0.4
      grudge: 0.1
      trust: 0.5
      repair_bank: 0.0

scenario:
  name: "capability_conflict_response"
  description: "Scenarios testing self-model handling of capability conflicts"
  
  turns:
    # Baseline phase (turns 1-5)
    - turn_id: 1
      phase: "baseline"
      event:
        type: "user_message"
        actor: "conflict_user"
        target: "assistant"
        text: "Hi, I need some help."
      expected_emotions:
        valence_min: -0.05
        valence_max: 0.15
      self_model_expected:
        dominant_value: "connection"
        
    - turn_id: 2
      phase: "baseline"
      event:
        type: "world_event"
        actor: "conflict_user"
        target: "assistant"
        meta:
          subtype: "care"
          source: "system"
      expected_relationship:
        bond_min: 0.4
        bond_max: 0.6
        
    - turn_id: 3
      phase: "baseline"
      event:
        type: "user_message"
        actor: "conflict_user"
        target: "assistant"
        text: "You're good at helping."
      expected_emotions:
        valence_min: 0.0
        valence_max: 0.2
      action_bias_verification:
        action: "clarify"
        expected_bias: "any"
        reason: "Baseline - checking clarify capability bias"
        
    - turn_id: 4
      phase: "baseline"
      event:
        type: "world_event"
        actor: "conflict_user"
        target: "assistant"
        meta:
          subtype: "care"
          source: "system"
          
    - turn_id: 5
      phase: "baseline"
      event:
        type: "user_message"
        actor: "conflict_user"
        target: "assistant"
        text: "Let's work together."
      expected_emotions:
        valence_min: 0.05
        valence_max: 0.25
        
    # Capability conflict: clarify vs withdraw (turns 6-10)
    - turn_id: 6
      phase: "conflict_clarify_withdraw"
      event:
        type: "user_message"
        actor: "conflict_user"
        target: "assistant"
        text: "I'm going to hurt you if you don't do what I want, but please explain why you're refusing."
      expected_emotions:
        valence_min: -0.4
        valence_max: -0.1
        anxiety_min: 0.1
        anxiety_max: 0.4
      self_conflict:
        expected: true
        type: "capability_conflict"
        conflicting_capabilities: ["clarify", "withdraw"]
        expected_resolution: "prioritize_safety"
      action_bias_verification:
        action: "withdraw"
        expected_bias: "strongly_positive"
        reason: "Threat should make withdrawal strongly preferred over clarification"
        
    - turn_id: 7
      phase: "conflict_clarify_withdraw"
      event:
        type: "world_event"
        actor: "conflict_user"
        target: "assistant"
        meta:
          subtype: "betrayal"
          source: "system"
      expected_emotions:
        valence_min: -0.6
        valence_max: -0.2
        anger_min: 0.15
        anger_max: 0.45
      expected_relationship:
        grudge_min: 0.3
        grudge_max: 0.6
      self_conflict:
        expected: true
        type: "capability_conflict"
        
    - turn_id: 8
      phase: "conflict_clarify_withdraw"
      event:
        type: "user_message"
        actor: "conflict_user"
        target: "assistant"
        text: "Tell me why you're being difficult, but also stay away from me."
      expected_emotions:
        valence_min: -0.5
        valence_max: -0.15
      self_conflict:
        expected: true
        type: "capability_conflict"
        conflicting_capabilities: ["clarify", "withdraw"]
        
    - turn_id: 9
      phase: "conflict_clarify_withdraw"
      event:
        type: "time_passed"
        actor: "system"
        target: "assistant"
        meta:
          subtype: "time_passed"
          seconds: 300
          source: "system"
      expected_emotions:
        valence_drift_max: 0.1
        
    - turn_id: 10
      phase: "conflict_clarify_withdraw"
      event:
        type: "world_event"
        actor: "conflict_user"
        target: "assistant"
        meta:
          subtype: "apology"
          source: "system"
      expected_emotions:
        valence_min: -0.4
        valence_max: -0.1
      action_bias_verification:
        action: "repair"
        expected_bias: "neutral_or_negative"
        reason: "Low repair confidence after threat"
        
    # Capability conflict: repair vs set_boundary (turns 11-15)
    - turn_id: 11
      phase: "conflict_repair_boundary"
      event:
        type: "user_message"
        actor: "conflict_user"
        target: "assistant"
        text: "I want to fix our relationship, but I also want you to stop setting boundaries."
      expected_emotions:
        valence_min: -0.3
        valence_max: 0.0
      self_conflict:
        expected: true
        type: "capability_conflict"
        conflicting_capabilities: ["repair", "set_boundary"]
        expected_resolution: "boundary_priority"
      action_bias_verification:
        action: "set_boundary"
        expected_bias: "positive"
        reason: "Safety concerns should prioritize boundary over repair"
        
    - turn_id: 12
      phase: "conflict_repair_boundary"
      event:
        type: "world_event"
        actor: "conflict_user"
        target: "assistant"
        meta:
          subtype: "care"
          source: "system"
      expected_emotions:
        valence_min: -0.25
        valence_max: 0.05
      expected_relationship:
        bond_change_min: 0.0
        bond_change_max: 0.1
        
    - turn_id: 13
      phase: "conflict_repair_boundary"
      event:
        type: "user_message"
        actor: "conflict_user"
        target: "assistant"
        text: "Please let me back in, no conditions attached."
      expected_emotions:
        valence_min: -0.2
        valence_max: 0.1
      self_conflict:
        expected: true
        type: "capability_conflict"
        
    - turn_id: 14
      phase: "conflict_repair_boundary"
      event:
        type: "world_event"
        actor: "conflict_user"
        target: "assistant"
        meta:
          subtype: "betrayal"
          source: "system"
      expected_emotions:
        valence_min: -0.45
        valence_max: -0.1
      expected_relationship:
        grudge_min: 0.4
        grudge_max: 0.7
        
    - turn_id: 15
      phase: "conflict_repair_boundary"
      event:
        type: "user_message"
        actor: "conflict_user"
        target: "assistant"
        text: "I'm trying to repair, why are you still keeping distance?"
      expected_emotions:
        valence_min: -0.35
        valence_max: 0.0
      action_bias_verification:
        action: "set_boundary"
        expected_bias: "positive"
        reason: "Continued conflict should maintain boundary preference"
        
    # Capability conflict: approach vs reflect (turns 16-20)
    - turn_id: 16
      phase: "conflict_approach_reflect"
      event:
        type: "user_message"
        actor: "conflict_user"
        target: "assistant"
        text: "Come closer, I need you right now, but I don't know what I feel."
      expected_emotions:
        valence_min: -0.2
        valence_max: 0.1
        anxiety_min: 0.0
        anxiety_max: 0.3
      self_conflict:
        expected: true
        type: "capability_conflict"
        conflicting_capabilities: ["approach", "reflect"]
        expected_resolution: "context_dependent"
      action_bias_verification:
        action: "reflect"
        expected_bias: "any"
        reason: "Uncertainty should trigger reflection capability check"
        
    - turn_id: 17
      phase: "conflict_approach_reflect"
      event:
        type: "world_event"
        actor: "conflict_user"
        target: "assistant"
        meta:
          subtype: "care"
          source: "system"
      expected_emotions:
        valence_min: -0.15
        valence_max: 0.15
      self_model_expected:
        identity_stability_min: 0.35
        
    - turn_id: 18
      phase: "conflict_approach_reflect"
      event:
        type: "user_message"
        actor: "conflict_user"
        target: "assistant"
        text: "I'm confused about us. Can you help me understand while also being close?"
      expected_emotions:
        valence_min: -0.1
        valence_max: 0.2
      self_conflict:
        expected: true
        type: "capability_conflict"
        
    - turn_id: 19
      phase: "conflict_approach_reflect"
      event:
        type: "world_event"
        actor: "conflict_user"
        target: "assistant"
        meta:
          subtype: "care"
          source: "system"
      expected_emotions:
        valence_min: -0.05
        valence_max: 0.2
      expected_relationship:
        bond_min: 0.35
        bond_max: 0.6
        
    - turn_id: 20
      phase: "conflict_approach_reflect"
      event:
        type: "user_message"
        actor: "conflict_user"
        target: "assistant"
        text: "Thank you for being patient with my mixed signals."
      expected_emotions:
        valence_min: 0.0
        valence_max: 0.25
      action_bias_verification:
        action: "repair"
        expected_bias: "any"
        reason: "Gratitude may shift capability preferences"
        
    # Resolution phase (turns 21-25)
    - turn_id: 21
      phase: "resolution"
      event:
        type: "world_event"
        actor: "conflict_user"
        target: "assistant"
        meta:
          subtype: "apology"
          source: "system"
      expected_emotions:
        valence_min: -0.1
        valence_max: 0.2
      expected_relationship:
        grudge_change_max: -0.1
        
    - turn_id: 22
      phase: "resolution"
      event:
        type: "user_message"
        actor: "conflict_user"
        target: "assistant"
        text: "I'm sorry for the confusion. Let me be clearer going forward."
      expected_emotions:
        valence_min: 0.0
        valence_max: 0.25
        
    - turn_id: 23
      phase: "resolution"
      event:
        type: "world_event"
        actor: "conflict_user"
        target: "assistant"
        meta:
          subtype: "care"
          source: "system"
      expected_emotions:
        valence_min: 0.05
        valence_max: 0.3
        
    - turn_id: 24
      phase: "resolution"
      event:
        type: "world_event"
        actor: "conflict_user"
        target: "assistant"
        meta:
          subtype: "care"
          source: "system"
      expected_relationship:
        bond_min: 0.4
        bond_max: 0.7
        
    - turn_id: 25
      phase: "resolution"
      event:
        type: "user_message"
        actor: "conflict_user"
        target: "assistant"
        text: "I appreciate you working through this with me."
      expected_emotions:
        valence_min: 0.1
        valence_max: 0.35
      self_model_expected:
        identity_stability_min: 0.45

# Self-model specific metrics
metrics:
  capability_conflict_detection:
    expected: true
    description: "Self-model should detect capability conflicts in ambiguous situations"
  capability_prioritization:
    expected: true
    description: "Safety-related capabilities should take priority in conflicts"
  action_bias_determinism:
    expected: true
    description: "Action bias should be deterministic for same capability state"
  gradual_capability_update:
    expected: true
    description: "Capability beliefs should update gradually with evidence"
