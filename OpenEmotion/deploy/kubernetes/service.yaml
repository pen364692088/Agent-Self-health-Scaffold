apiVersion: v1
kind: Service
metadata:
  name: openemotion-api-service
  namespace: openemotion
  labels:
    app: openemotion
    component: api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: openemotion
    component: api

---
apiVersion: v1
kind: Service
metadata:
  name: openemotion-api-service
  namespace: openemotion-staging
  labels:
    app: openemotion
    component: api
    environment: staging
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: openemotion
    component: api