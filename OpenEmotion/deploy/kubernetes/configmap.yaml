apiVersion: v1
kind: ConfigMap
metadata:
  name: openemotion-config
  namespace: openemotion
  labels:
    app: openemotion
    component: api
data:
  # API Configuration
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_DEBUG: "false"
  
  # Model Configuration
  MODEL_NAME: "qwen2.5:3b-instruct"
  MODEL_BASE_URL: "http://host.docker.internal:11434"
  
  # Security Configuration
  JWT_SECRET_KEY: "PLACEHOLDER_JWT_SECRET"  # Will be replaced by actual secret
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRATION_HOURS: "24"
  
  # Performance Configuration
  MAX_CONCURRENT_REQUESTS: "100"
  REQUEST_TIMEOUT_SECONDS: "30"
  
  # Logging Configuration
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  
  # Rate Limiting
  RATE_LIMIT_REQUESTS_PER_MINUTE: "100"
  RATE_LIMIT_BURST: "20"
  
  # CORS Configuration
  CORS_ORIGINS: "https://api.emotiond.ai,https://emotiond.openclaw.ai"
  CORS_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
  CORS_HEADERS: "Content-Type,Authorization"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openemotion-config
  namespace: openemotion-staging
  labels:
    app: openemotion
    component: api
data:
  # API Configuration
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_DEBUG: "true"
  
  # Model Configuration
  MODEL_NAME: "qwen2.5:3b-instruct"
  MODEL_BASE_URL: "http://host.docker.internal:11434"
  
  # Security Configuration
  JWT_SECRET_KEY: "STAGING_JWT_SECRET"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRATION_HOURS: "24"
  
  # Performance Configuration
  MAX_CONCURRENT_REQUESTS: "50"
  REQUEST_TIMEOUT_SECONDS: "60"
  
  # Logging Configuration
  LOG_LEVEL: "DEBUG"
  LOG_FORMAT: "json"
  
  # Rate Limiting
  RATE_LIMIT_REQUESTS_PER_MINUTE: "200"
  RATE_LIMIT_BURST: "50"
  
  # CORS Configuration
  CORS_ORIGINS: "*"
  CORS_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
  CORS_HEADERS: "Content-Type,Authorization"