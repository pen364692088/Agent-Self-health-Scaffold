apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: openemotion-api-monitor
  namespace: openemotion
  labels:
    app: openemotion
    component: api
    release: prometheus
spec:
  selector:
    matchLabels:
      app: openemotion
      component: api
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: openemotion-api-monitor
  namespace: openemotion-staging
  labels:
    app: openemotion
    component: api
    environment: staging
    release: prometheus
spec:
  selector:
    matchLabels:
      app: openemotion
      component: api
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s