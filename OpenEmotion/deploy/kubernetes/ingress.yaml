apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openemotion-api-ingress
  namespace: openemotion
  labels:
    app: openemotion
    component: api
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/rate-limit-burst: "20"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://api.emotiond.ai,https://emotiond.openclaw.ai"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET,POST,PUT,DELETE,OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type,Authorization"
spec:
  tls:
  - hosts:
    - api.emotiond.ai
    - emotiond.openclaw.ai
    secretName: openemotion-tls
  rules:
  - host: api.emotiond.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: openemotion-api-service
            port:
              number: 80
  - host: emotiond.openclaw.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: openemotion-api-service
            port:
              number: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openemotion-api-ingress
  namespace: openemotion-staging
  labels:
    app: openemotion
    component: api
    environment: staging
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET,POST,PUT,DELETE,OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type,Authorization"
spec:
  tls:
  - hosts:
    - staging-api.emotiond.ai
    secretName: openemotion-staging-tls
  rules:
  - host: staging-api.emotiond.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: openemotion-api-service
            port:
              number: 80