apiVersion: v1
kind: Secret
metadata:
  name: openemotion-secrets
  namespace: openemotion
  labels:
    app: openemotion
    component: api
type: Opaque
data:
  # Base64 encoded values - these will be replaced during deployment
  # JWT_SECRET_KEY: <base64-encoded-secret>
  # AWS_ACCESS_KEY_ID: <base64-encoded-key>
  # AWS_SECRET_ACCESS_KEY: <base64-encoded-secret>
  # DATABASE_URL: <base64-encoded-url>

---
apiVersion: v1
kind: Secret
metadata:
  name: openemotion-secrets
  namespace: openemotion-staging
  labels:
    app: openemotion
    component: api
type: Opaque
data:
  # Staging secrets - less sensitive values
  JWT_SECRET_KEY: c3RhZ2luZ19qd3Rfc2VjcmV0  # "staging_jwt_secret" in base64