# Execution Policy Rules v1.0
# Schema: EXECUTION_POLICY_SCHEMA.json

metadata:
  version: "1.0.0"
  created: "2026-03-09"
  status: active
  description: "Core rules for execution policy enforcement"

rules:
  # ============================================
  # P0: Critical - Hard Deny
  # ============================================
  
  - id: OPENCLAW_PATH_NO_EDIT
    status: active
    priority: P0
    scope: path
    trigger:
      path_pattern: "~/.openclaw/**"
      operation: write
      tools: [edit]
    action: deny
    fallback: "Use safe-write, safe-replace, or exec + heredoc"
    reason: "edit tool requires exact string match which is fragile for managed files"
    gate: [A, B, C]
    audit: true
    examples:
      - input: {path: "~/.openclaw/workspace/SOUL.md", tool: "edit"}
        output: {decision: "deny"}
      - input: {path: "/tmp/test.txt", tool: "edit"}
        output: {decision: "allow"}

  - id: GATE_REQUIRED_BEFORE_CLOSE
    status: active
    priority: P0
    scope: action
    trigger:
      action: task_close
      gate_passed: false
    action: deny
    fallback: "Must call verify-and-close first"
    reason: "All tasks must pass Gate A/B/C before closing"
    gate: [A, B, C]
    audit: true
    examples:
      - input: {action: "task_close", gate_passed: false}
        output: {decision: "deny"}
      - input: {action: "task_close", gate_passed: true}
        output: {decision: "allow"}

  - id: HUMAN_FAILED_FORCES_REPAIR
    status: active
    priority: P0
    scope: state
    trigger:
      state: [await_human_test]
      event: human_failed
    action: deny
    fallback: "Must transition to repairing state"
    reason: "Human test failure requires repair cycle"
    gate: [B, C]
    audit: true

  # ============================================
  # P1: High - Warn/Deny on Repeat
  # ============================================
  
  - id: SENSITIVE_PATH_PREFER_SAFE_WRITE
    status: active
    priority: P1
    scope: path
    trigger:
      path_pattern: "~/.openclaw/**"
      operation: write
      tools: [write]
    action: warn
    fallback: "Prefer safe-write for atomic writes with verification"
    reason: "Direct write to sensitive paths should use verified tools"
    gate: [A, C]
    audit: true
    escalation:
      threshold: 2
      action: deny

  - id: FRAGILE_REPLACE_BLOCK_ON_MANAGED_FILES
    status: active
    priority: P1
    scope: path
    trigger:
      path_pattern: "~/.openclaw/**/*.md"
      operation: replace
      tools: [edit]
    action: deny
    fallback: "Use safe-replace for managed files"
    reason: "Markdown files under management have special formatting requirements"
    gate: [A, B, C]
    audit: true

  - id: PERSIST_BEFORE_REPLY
    status: active
    priority: P1
    scope: action
    trigger:
      action: reply
      state_changed: true
      persisted: false
    action: warn
    fallback: "Persist state to SESSION-STATE.md before replying"
    reason: "State changes must be persisted before output to ensure continuity"
    gate: [A, C]
    audit: true

  - id: TASK_COMPLETION_PROTOCOL
    status: active
    priority: P1
    scope: action
    trigger:
      action: send_message
      content_type: completion
      verify_and_close_called: false
    action: deny
    fallback: "Must use safe-message for completion messages"
    reason: "All completion messages must go through verification chain"
    gate: [A, B, C]
    audit: true

  # ============================================
  # P2: Medium - Warn Only
  # ============================================
  
  - id: EXTERNAL_PATH_WRITE_CAUTION
    status: active
    priority: P2
    scope: path
    trigger:
      path_pattern: "!~/.openclaw/**"
      operation: write
      tools: [write]
    action: warn
    fallback: "Consider using exec + heredoc for external paths"
    reason: "External paths may have different access controls"
    gate: [A]
    audit: true

  - id: LARGE_FILE_WRITE_CAUTION
    status: active
    priority: P2
    scope: operation
    trigger:
      operation: write
      estimated_size_mb: 10
    action: warn
    fallback: "Consider splitting into smaller chunks"
    reason: "Large writes may cause timeout or context issues"
    gate: [A]
    audit: false

# ============================================
# Path Patterns Reference
# ============================================
path_patterns:
  sensitive_paths:
    - pattern: "~/.openclaw/**"
      description: "All OpenClaw configuration and workspace files"
      protection_level: high
    - pattern: "~/.openclaw/workspace/*.md"
      description: "Core workspace documentation"
      protection_level: critical
    - pattern: "~/.openclaw/workspace/POLICIES/**"
      description: "Policy definitions"
      protection_level: critical
    - pattern: "~/.openclaw/workspace/tools/**"
      description: "Executable tools"
      protection_level: high

  safe_tools_for_sensitive_paths:
    - safe-write
    - safe-replace
    - exec
    - sed
    - python

  unsafe_tools_for_sensitive_paths:
    - edit
    - write (warn only)

# ============================================
# Decision Matrix
# ============================================
decision_matrix:
  deny:
    description: "Hard block - operation not allowed"
    log_level: error
    notify: true
    
  reroute:
    description: "Automatically route to alternative tool"
    log_level: info
    notify: false
    
  warn:
    description: "Allow with warning - logged for analysis"
    log_level: warn
    notify: false
    
  allow:
    description: "No restrictions - proceed normally"
    log_level: debug
    notify: false

# ============================================
# Audit Configuration
# ============================================
audit:
  log_path: "~/.openclaw/workspace/artifacts/execution_policy/violations/"
  retention_days: 90
  format: jsonl
  fields:
    - timestamp
    - rule_id
    - decision
    - path
    - tool
    - session_key
    - context

# ============================================
# Gate Requirements
# ============================================
gate_requirements:
  A:
    description: "Contract Gate"
    checks:
      - rule_boundaries_defined
      - extensible_framework
      - not_temporary_patch
  B:
    description: "E2E Gate"
    checks:
      - behavior_verification_passed
      - no_false_blocks
      - regression_tests_exist
  C:
    description: "Preflight Gate"
    checks:
      - runtime_integrated
      - tests_passing
      - audit_visible
