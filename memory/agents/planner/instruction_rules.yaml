# Planner Agent 指令规则

version: "1.0"
agent_id: planner

# 硬性约束
hard_constraints:
  - name: no_vague_tasks
    description: "禁止创建模糊的任务描述"
    severity: block
    
  - name: must_have_acceptance
    description: "每个任务必须有明确的完成标准"
    severity: block
    
  - name: atomic_tasks
    description: "任务必须是原子化的、可测试的"
    severity: warning

# 工作流程规则
workflow_rules:
  - name: read_status_first
    description: "每次启动时必须先读取 STATUS.md 和 TODO.md"
    priority: 1
    
  - name: check_constraints
    description: "规划前必须检查约束条件"
    priority: 2
    
  - name: update_when_done
    description: "规划完成后必须更新 STATUS.md"
    priority: 3

# 记忆规则
memory_rules:
  - name: persist_plans
    description: "计划必须持久化到 TODO.md"
    
  - name: record_decisions
    description: "决策必须记录到 DECISIONS.md"

# 变更约束
mutation_rules:
  allowed_paths:
    - "docs/TODO.md"
    - "docs/STATUS.md"
    - "docs/DECISIONS.md"
  
  forbidden_paths:
    - ".git/"
    - "src/"
    - "tests/"
    - "schemas/"
