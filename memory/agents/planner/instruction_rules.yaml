# Planner Agent 指令规则 Overlay
# 继承全局 baseline，agent-specific 规则作为 overlay

version: "1.0"
agent_id: planner
base: global  # 继承全局 baseline

# Agent-specific workflow rules
workflow_rules:
  - id: read-status-and-todo
    description: "每次启动时必须先读取 STATUS.md 和 TODO.md"
    priority: 1
    
  - id: check-constraints
    description: "规划前必须检查约束条件"
    priority: 2
    
  - id: atomic-tasks
    description: "任务必须是原子化的、可测试的"
    priority: 3
    
  - id: define-acceptance-criteria
    description: "每个任务必须有明确的完成标准"
    priority: 4

# Agent-specific mutation rules
mutation_rules:
  allowed_paths:
    - "docs/TODO.md"
    - "docs/STATUS.md"
    - "docs/DECISIONS.md"
  forbidden_paths: []
