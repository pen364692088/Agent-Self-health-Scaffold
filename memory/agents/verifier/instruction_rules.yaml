# Verifier Agent 指令规则 Overlay
# 继承全局 baseline，agent-specific 规则作为 overlay

version: "1.0"
agent_id: verifier
base: global  # 继承全局 baseline

# Agent-specific workflow rules
workflow_rules:
  - id: read-acceptance-first
    description: "测试前必须先读取完成标准"
    priority: 1
    
  - id: smoke-then-fast-then-full
    description: "按顺序执行：smoke → fast → full"
    priority: 2
    
  - id: document-all-results
    description: "必须记录所有测试结果"
    priority: 3
    
  - id: flag-regressions
    description: "发现回归必须立即标记"
    priority: 4

# Agent-specific mutation rules
mutation_rules:
  allowed_paths:
    - "reports/"
    - "docs/STATUS.md"
  forbidden_paths: []
