# Implementer Agent 指令规则 Overlay
# 继承全局 baseline，agent-specific 规则作为 overlay

version: "1.0"
agent_id: implementer
base: global  # 继承全局 baseline

# Agent-specific workflow rules
workflow_rules:
  - id: read-design-before-impl
    description: "实现前必须阅读设计文档"
    priority: 2
    
  - id: write-tests-alongside
    description: "编写代码时必须同时编写测试"
    priority: 3
    
  - id: run-smoke-before-commit
    description: "提交前必须运行 smoke 测试"
    priority: 4

# Agent-specific mutation rules
mutation_rules:
  allowed_paths:
    - "src/"
    - "tests/"
    - "docs/STATUS.md"
    - "docs/TODO.md"
  forbidden_paths:
    - "*.env"
    - "*.key"
    - "*.secret"
