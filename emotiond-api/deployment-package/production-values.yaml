# Helm Production Values
# Environment: Production
# Purpose: Production deployment configurations with security and scaling

# Global Configuration
  global:
  environment: production
  namespace: emotiond
  imageRegistry: registry.emotiond.ai
  imageTag: v1.0.0

# Application Configuration
  app:
  name: emotiond-api
  replicas: 3
  image:
    repository: emotiond/api
    tag: v1.0.0
    pullPolicy: IfNotPresent
  
  # Resource Configuration
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 500m
  
  # Health Checks
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  
  readinessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  
  # Environment Variables
  env:
    ENVIRONMENT: production
    LOG_LEVEL: INFO
    WORKERS: 4
    MAX_CONNECTIONS: 1000
    CONNECTION_TIMEOUT: 30
    KEEP_ALIVE: 5
  
  # Security Context
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  
  # Volume Mounts
  volumeMounts:
    - name: tmp
      mountPath: /tmp
    - name: logs
      mountPath: /app/logs

# Service Configuration
  service:
  type: ClusterIP
  port: 80
  targetPort: 8000
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"

# Ingress Configuration
  ingress:
  enabled: true
  className: nginx
  host: api.emotiond.ai
  tls:
    enabled: true
    secretName: emotiond-api-tls
    clusterIssuer: letsencrypt-prod
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/rate-limit-connections: "50"
    nginx.ingress.kubernetes.io/rate-limit-burst: "20"
    nginx.ingress.kubernetes.io/rate-limit-requests-per-second: "10"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    cert-manager.io/cluster-issuer: letsencrypt-prod

# Autoscaling Configuration
  autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60

# Pod Disruption Budget
  podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Network Policies
  networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53

# Resource Quotas
  resourceQuota:
  enabled: true
  requests:
    cpu: "1"
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi
    persistentvolumeclaims: "5"
    services: "5"
    secrets: "10"
    configmaps: "10"

# Pod Security Policies
  podSecurityPolicy:
  enabled: true
  privileged: false
    allowPrivilegeEscalation: false
    requiredDropCapabilities:
      - ALL
    volumes:
      - 'configMap'
      - 'emptyDir'
      - 'projected'
      - 'secret'
      - 'downwardAPI'
      - 'persistentVolumeClaim'
    runAsUser:
      rule: 'MustRunAsNonRoot'
    seLinux:
      rule: 'RunAsAny'
    fsGroup:
      rule: 'RunAsAny'
    readOnlyRootFilesystem: true

# Monitoring Configuration
  monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    labels:
      release: prometheus
  prometheusRule:
    enabled: true
    rules:
      - alert: EmotiondAPIHighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Emotiond API high error rate"
          description: "Emotiond API error rate is {{ $value }} errors per second"
      
      - alert: EmotiondAPIHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Emotiond API high latency"
          description: "Emotiond API 95th percentile latency is {{ $value }} seconds"
      
      - alert: EmotiondAPIDown
        expr: up{job="emotiond-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Emotiond API is down"
          description: "Emotiond API has been down for more than 1 minute"

# Logging Configuration
  logging:
  enabled: true
  level: INFO
  format: json
  outputs:
    - type: stdout
    - type: file
      path: /app/logs/app.log
      maxSize: 100MB
      maxFiles: 10
    - type: loki
      endpoint: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
      labels:
        app: emotiond-api
        environment: production

# Tracing Configuration
  tracing:
  enabled: true
  jaeger:
    endpoint: http://jaeger.monitoring.svc.cluster.local:14268/api/traces
    service_name: emotiond-api
    sampler_type: const
    sampler_param: 0.1

# Secret Management
  secrets:
  enabled: true
  externalSecrets:
    - name: emotiond-secrets
      externalSecretName: emotiond-api-secrets
      data:
        - key: jwt-secret
          name: JWT_SECRET_KEY
        - key: database-url
          name: DATABASE_URL
        - key: redis-url
          name: REDIS_URL
        - key: api-keys
          name: API_KEYS

# Database Configuration
  database:
  enabled: true
  host: postgres.production.svc.cluster.local
  port: 5432
  name: emotiond_production
  poolSize: 20
  maxOverflow: 30
  poolTimeout: 30
  poolRecycle: 3600

# Redis Configuration
  redis:
  enabled: true
  host: redis.production.svc.cluster.local
  port: 6379
  db: 0
  maxConnections: 100
  socketTimeout: 30
  socketConnectTimeout: 30

# Backup Configuration
  backup:
  enabled: true
  schedule: "0 2 * * *"
  retention: "30d"
  storage:
    type: s3
    bucket: emotiond-backups
    region: us-west-2
    endpoint: s3.us-west-2.amazonaws.com

# Security Configuration
  security:
  enabled: true
  jwt:
    expiration: 3600
    refreshExpiration: 86400
  rateLimiting:
    enabled: true
    requestsPerMinute: 100
    burstSize: 20
  cors:
    enabled: true
    origins:
      - "https://app.emotiond.ai"
      - "https://dashboard.emotiond.ai"
    methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    headers:
      - Content-Type
      - Authorization
      - X-Requested-With
  https:
    enabled: true
    redirectHttp: true
    hsts:
      enabled: true
      maxAge: 31536000
      includeSubDomains: true
      preload: true

# Cost Optimization
  costOptimization:
  enabled: true
  nodeAffinity:
    enabled: true
    nodeSelectorTerms:
      - matchExpressions:
          - key: node-type
            operator: In
            values:
              - compute-optimized
  spotInstances:
    enabled: false
  resourceOptimization:
    enabled: true
    cpuRequests: 250m
    memoryRequests: 512Mi
    cpuLimits: 500m
    memoryLimits: 1Gi