# Memory Retrieval Hardening - GitHub Actions CI
# 放置到: .github/workflows/memory-hardening.yml
#
# 功能:
# - 每次提交运行回归测试
# - 每日自动运行观测期检查
# - PR 检查确保不破坏语义

name: Memory Retrieval Hardening CI

on:
  push:
    paths:
      - 'tools/memory-*'
      - 'tools/use-link-audit'
      - 'tools/parse-used-memory'
      - 'tests/test_memory_retrieval_hardening.py'
      - '.github/workflows/memory-hardening.yml'
  pull_request:
    paths:
      - 'tools/memory-*'
      - 'tests/test_memory_retrieval_hardening.py'
  schedule:
    # 每日 00:00 UTC 运行
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run regression tests
        run: |
          python3 tests/test_memory_retrieval_hardening.py
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: memory/reports/

  risk-alerts-golden:
    name: Risk Alerts on Golden Fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Create golden fixture
        run: |
          mkdir -p memory/golden_fixtures
          cat > memory/golden_fixtures/events_golden.jsonl << 'EOF'
          {"event": "recall", "ts": "2026-03-03T10:00:00Z", "recall_id": "golden_r1", "used": ["mem_golden_001"], "candidates_count": 1, "event_version": "v2"}
          {"event": "use", "ts": "2026-03-03T10:00:01Z", "memory_id": "mem_golden_001", "recall_id": "golden_r1", "event_version": "v2"}
          {"event": "recall", "ts": "2026-03-03T10:01:00Z", "recall_id": "golden_r2", "used": ["mem_golden_002", "mem_golden_003"], "candidates_count": 2, "event_version": "v2"}
          {"event": "use", "ts": "2026-03-03T10:01:01Z", "memory_id": "mem_golden_002", "recall_id": "golden_r2", "event_version": "v2"}
          EOF
      
      - name: Run risk alerts
        run: |
          cp memory/golden_fixtures/events_golden.jsonl memory/events.log
          python3 tools/memory-risk-alerts --json > alerts_output.json
          cat alerts_output.json
          
          # Check for ERROR level alerts
          if python3 -c "import json; d=json.load(open('alerts_output.json')); exit(1 if any(a['level']=='ERROR' for a in d.get('alerts',[])) else 0)"; then
            echo "✅ No ERROR alerts"
          else
            echo "❌ ERROR alerts detected on golden fixture"
            exit 1
          fi

  daily-observation:
    name: Daily Observation
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run daily observation
        run: |
          chmod +x tools/memory-daily-obs
          ./tools/memory-daily-obs
      
      - name: Upload daily report
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_date }}
          path: memory/reports/daily/
      
      - name: Check for errors
        run: |
          LATEST_REPORT=$(ls -t memory/reports/daily/obs_*.json | head -1)
          if python3 -c "import json; d=json.load(open('$LATEST_REPORT')); exit(1 if any(a['level']=='ERROR' for a in d.get('alerts',{}).get('alerts',[])) else 0)"; then
            echo "✅ Daily observation passed"
          else
            echo "❌ ERROR alerts detected"
            exit 1
          fi

  threshold-validation:
    name: Validate Threshold Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check threshold constants
        run: |
          echo "Checking MIN_EVENTS..."
          grep -q "MIN_EVENTS = 200" tools/memory-dashboard || (echo "MIN_EVENTS not 200"; exit 1)
          
          echo "Checking MIN_SESSIONS..."
          grep -q "MIN_SESSIONS = 20" tools/memory-dashboard || (echo "MIN_SESSIONS not 20"; exit 1)
          
          echo "Checking DEPLOY_START_DATE..."
          grep -q "DEPLOY_START_DATE" tools/memory-dashboard || (echo "DEPLOY_START_DATE not found"; exit 1)
          
          echo "✅ All threshold constants validated"
