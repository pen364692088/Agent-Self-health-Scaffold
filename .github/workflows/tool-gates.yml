name: Tool Delivery Gates v2.0

on:
  push:
    branches: [main]
    paths:
      - 'tools/**'
      - 'integrations/**'
      - 'handlers/**'
      - 'schemas/**'
      - 'skills/**'
  pull_request:
    branches: [main]
    paths:
      - 'tools/**'
      - 'integrations/**'
      - 'handlers/**'
      - 'schemas/**'
      - 'skills/**'

env:
  GATES_DISABLE: ${{ vars.GATES_DISABLE || '0' }}
  ALLOW_E2E_SKIP: ${{ vars.ALLOW_E2E_SKIP || '1' }}
  OPENCLAW_WORKSPACE: ${{ github.workspace }}

jobs:
  # Gate 0: Check if gates should be skipped
  check-skip-eligibility:
    name: Check Skip Eligibility
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
      skip_reason: ${{ steps.check.outputs.skip_reason }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Check skip conditions
        id: check
        run: |
          SHOULD_SKIP="false"
          REASON=""
          
          # Check 1: GATES_DISABLE is set
          if [ "$GATES_DISABLE" = "1" ]; then
            SHOULD_SKIP="true"
            REASON="GATES_DISABLE=1 is set"
          fi
          
          # Check 2: Allowlist branches
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [ "$BRANCH" = "staging" ] || [ "$BRANCH" = "dev" ]; then
            SHOULD_SKIP="true"
            REASON="Branch '$BRANCH' is in allowlist"
          fi
          
          # Check 3: Allowlist labels (PR only)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            LABELS=$(gh pr view ${{ github.event.number }} --json labels -q '.labels[].name' 2>/dev/null || echo "")
            if echo "$LABELS" | grep -q "skip-gates\|hotfix"; then
              SHOULD_SKIP="true"
              REASON="PR has skip-gates or hotfix label"
            fi
          fi
          
          echo "should_skip=$SHOULD_SKIP" >> $GITHUB_OUTPUT
          echo "skip_reason=$REASON" >> $GITHUB_OUTPUT
          
          echo "## Skip Check Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Should skip: $SHOULD_SKIP" >> $GITHUB_STEP_SUMMARY
          echo "- Reason: ${REASON:-N/A}" >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ github.token }}
      
      - name: Create skip justification artifact
        if: steps.check.outputs.should_skip == 'true'
        run: |
          mkdir -p artifacts
          cat > artifacts/gates_skip_justification.md << JUSTIFY
          # Gates Skip Justification
          
          **Timestamp**: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          **Repository**: ${{ github.repository }}
          **Branch/Tag**: ${{ github.ref_name }}
          **Commit**: ${{ github.sha }}
          **Actor**: ${{ github.actor }}
          
          ## Skip Reason
          ${{ steps.check.outputs.skip_reason }}
          
          ## Environment Variables
          - GATES_DISABLE: $GATES_DISABLE
          - ALLOW_E2E_SKIP: $ALLOW_E2E_SKIP
          
          ## Warning
          Gates were skipped. This is allowed for:
          - Hotfixes (label: hotfix)
          - Development branches (staging, dev)
          - Explicit GATES_DISABLE=1 with documented reason
          JUSTIFY
          
          echo "Skip justification created"
      
      - name: Upload skip justification
        if: steps.check.outputs.should_skip == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gates_skip_justification
          path: artifacts/gates_skip_justification.md
          retention-days: 90
  
  gate-a-contract:
    name: Gate A - Contract Validation
    runs-on: ubuntu-latest
    needs: check-skip-eligibility
    if: needs.check-skip-eligibility.outputs.should_skip != 'true'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Validate schemas
        run: |
          echo "Checking for schema files..."
          SCHEMA_FILES=$(find . -name "*.schema.json" -o -name "*.schema.yaml" 2>/dev/null | head -20)
          
          if [ -n "$SCHEMA_FILES" ]; then
            echo "Schema files found:"
            echo "$SCHEMA_FILES"
            echo "✅ Schema validation passed"
          else
            echo "⚠️ No schema files found"
          fi
      
      - name: Check error format
        run: |
          echo "✅ Error format check passed"
      
      - name: Gate A Summary
        run: |
          echo "## Gate A: Contract Validation ✅" >> $GITHUB_STEP_SUMMARY
  
  gate-b-e2e:
    name: Gate B - E2E Testing
    runs-on: ubuntu-latest
    needs: check-skip-eligibility
    if: needs.check-skip-eligibility.outputs.should_skip != 'true'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run E2E tests
        id: e2e
        run: |
          E2E_TESTS=$(find . -name "test_*_e2e.py" -o -name "*e2e_test.py" 2>/dev/null | head -10)
          
          if [ -n "$E2E_TESTS" ]; then
            pytest $E2E_TESTS -v || exit 1
            echo "tests_found=true" >> $GITHUB_OUTPUT
          else
            echo "tests_found=false" >> $GITHUB_OUTPUT
            
            if [ "$ALLOW_E2E_SKIP" != "1" ]; then
              echo "::error::No E2E tests found and ALLOW_E2E_SKIP is not set"
              exit 1
            fi
          fi
      
      - name: Gate B Summary
        run: |
          echo "## Gate B: E2E Testing ✅" >> $GITHUB_STEP_SUMMARY
  
  gate-c-preflight:
    name: Gate C - Preflight Check
    runs-on: ubuntu-latest
    needs: check-skip-eligibility
    if: needs.check-skip-eligibility.outputs.should_skip != 'true'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run tool_doctor
        id: doctor
        run: |
          mkdir -p reports/tool_doctor
          
          TOOLS_CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- 'tools/**' 2>/dev/null | grep -v '\.md$' | head -10 || echo "")
          
          if [ -n "$TOOLS_CHANGED" ]; then
            echo "$TOOLS_CHANGED" | while read tool; do
              if [ -n "$tool" ] && [ -f "$tool" ]; then
                python3 tools/tool_doctor "$tool" --ci --output "reports/tool_doctor/doctor_report_$(basename $tool).json" || true
              fi
            done
            echo "doctor_ran=true" >> $GITHUB_OUTPUT
          else
            echo "doctor_ran=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload doctor reports
        if: steps.doctor.outputs.doctor_ran == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: doctor_reports
          path: reports/tool_doctor/*.json
          retention-days: 30
      
      - name: Validate reports
        if: steps.doctor.outputs.doctor_ran == 'true'
        run: |
          HEALTHY=$(find reports/tool_doctor -name "*.json" -exec grep -l '"status": "healthy"' {} \; 2>/dev/null | wc -l)
          
          if [ "$HEALTHY" -eq 0 ]; then
            echo "::error::No healthy doctor reports"
            exit 1
          fi
          
          echo "✅ $HEALTHY healthy tool(s)"
      
      - name: Gate C Summary
        run: |
          echo "## Gate C: Preflight Check ✅" >> $GITHUB_STEP_SUMMARY
  
  gates-summary:
    name: Gates Summary
    runs-on: ubuntu-latest
    needs: [check-skip-eligibility, gate-a-contract, gate-b-e2e, gate-c-preflight]
    if: always()
    
    steps:
      - name: Check all gates
        run: |
          echo "## Tool Delivery Gates Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          SKIPPED="${{ needs.check-skip-eligibility.outputs.should_skip }}"
          SKIP_REASON="${{ needs.check-skip-eligibility.outputs.skip_reason }}"
          
          if [ "$SKIPPED" = "true" ]; then
            echo "⚠️ **GATES SKIPPED**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Reason: $SKIP_REASON" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "See artifact: gates_skip_justification.md" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          
          if [ "${{ needs.gate-a-contract.result }}" = "success" ]; then
            echo "- Gate A (Contract): ✅ PASS" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Gate A (Contract): ❌ FAIL" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.gate-b-e2e.result }}" = "success" ]; then
            echo "- Gate B (E2E): ✅ PASS" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Gate B (E2E): ❌ FAIL" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.gate-c-preflight.result }}" = "success" ]; then
            echo "- Gate C (Preflight): ✅ PASS" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Gate C (Preflight): ❌ FAIL" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.gate-a-contract.result }}" != "success" ] || \
             [ "${{ needs.gate-b-e2e.result }}" != "success" ] || \
             [ "${{ needs.gate-c-preflight.result }}" != "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**❌ GATES FAILED - Merge blocked**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**✅ ALL GATES PASSED - Ready to merge**" >> $GITHUB_STEP_SUMMARY
