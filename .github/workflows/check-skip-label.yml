name: Check Skip Gates Label

on:
  pull_request:
    types: [labeled, unlabeled]

env:
  PROTECTED_LABELS: "skip-gates,hotfix"
  ALLOWED_ROLES: "OWNER,MEMBER,MAINTAINER"

jobs:
  check-label-permission:
    name: Check Label Permission
    runs-on: ubuntu-latest
    if: contains(env.PROTECTED_LABELS, github.event.label.name)
    
    steps:
      - name: Check actor permission
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABEL="${{ github.event.label.name }}"
          ACTOR="${{ github.actor }}"
          REPO="${{ github.repository }}"
          
          echo "Label: $LABEL"
          echo "Actor: $ACTOR"
          echo "Repo: $REPO"
          
          # Get actor's permission level
          PERMISSION=$(gh api repos/$REPO/collaborators/$ACTOR/permission --jq '.permission')
          echo "Permission level: $PERMISSION"
          
          # Check if actor has sufficient permission
          # Valid levels: admin, maintain, write, read, none
          if [ "$PERMISSION" = "admin" ] || [ "$PERMISSION" = "maintain" ]; then
            echo "✅ Actor $ACTOR has permission $PERMISSION to add $LABEL label"
            echo "allowed=true" >> $GITHUB_OUTPUT
          else
            echo "::error::Actor $ACTOR (permission: $PERMISSION) cannot add protected label '$LABEL'"
            echo "Only repository owners and maintainers can add '$LABEL' label"
            echo "allowed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Remove unauthorized label
        if: steps.check.outputs.allowed != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABEL="${{ github.event.label.name }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          
          echo "Removing unauthorized label: $LABEL"
          gh api repos/$REPO/issues/$PR_NUMBER/labels/$LABEL -X DELETE
          
          # Add comment explaining why label was removed
          COMMENT_BODY=$(cat <<'EOF'
          ⚠️ Label `${{ github.event.label.name }}` was removed because ${{ github.actor }} does not have maintainer permission.
          
          Only repository owners and maintainers can add the `${{ github.event.label.name }}` label.
          
          To request this label:
          1. Add a comment: `@maintainers please add ${{ github.event.label.name }} label with reason: <your reason>`
          2. Wait for maintainer approval
          EOF
          )
          gh api repos/$REPO/issues/$PR_NUMBER/comments -f body="$COMMENT_BODY"

      - name: Log label usage
        if: steps.check.outputs.allowed == 'true'
        run: |
          echo "## Skip Gates Label Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Label**: ${{ github.event.label.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **PR**: #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Authorized" >> $GITHUB_STEP_SUMMARY
