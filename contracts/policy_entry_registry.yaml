# 入口分类定义
entry_classes:
  P0:
    description: "主链强相关入口 - 能触发任务执行、影响任务决策、影响恢复/retry/resume、影响Gate/放行"
    must_register: true
    requires_governance: true
  P1:
    description: "潜在主链旁路入口 - callback/resume/recovery/bridge/router等可间接影响主链"
    must_register: true
    requires_governance: true
  P2:
    description: "辅助治理/运维/诊断入口 - 不直接推进主链业务，但影响治理观测与安全性"
    must_register: false
    requires_governance: false
  P3:
    description: "测试/示例/废弃/误报入口 - 不影响主链"
    must_register: false
    requires_governance: false

